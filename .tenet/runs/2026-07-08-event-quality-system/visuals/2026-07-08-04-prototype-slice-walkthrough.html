<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Slice Walkthrough</title><style>
body{margin:0;background:#16130f;color:#fff3d7;font-family:system-ui,sans-serif}main{max-width:820px;margin:0 auto;padding:28px}.screen{display:none;border:4px solid #2a2018;background:#fff3d7;color:#2a241e;box-shadow:6px 6px 0 #0a0705;padding:24px}.screen.active{display:block}button{border:3px solid #2a2018;background:#f7d08b;padding:10px 14px;font-weight:900;box-shadow:3px 3px 0 #2a2018}.log{border:2px solid #2a2018;background:#fffaf0;padding:12px;margin:12px 0;font-family:monospace;font-size:13px;white-space:pre-wrap}</style></head>
<body><main><h1>이벤트 품질 시스템 슬라이스 워크스루</h1>
<section id="s1" class="screen active"><h2>Slice 1</h2><p>다음 사건 생성 시 검수기가 먼저 판단한다. 반복이 무의미하면 재생성, 이어지는 사건이면 통과.</p><div class="log">verdict: fail
reason: academic_conflict
retryUsed: true
fallbackUsed: false</div><button onclick="show('s2')">다음 슬라이스 보기</button></section>
<section id="s2" class="screen"><h2>Slice 2</h2><p>결과와 엔딩 문장에서 숫자 스탯을 제거한다.</p><div class="log">before: 건강 6의 몸은...
after: 아직 버틸 힘은 남아 있었지만...</div><button onclick="show('s1')">처음으로</button></section>
</main><script>function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}</script></body></html>
