<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Slice 2</title><style>

<body><main><h1>Slice 2: 결과/엔딩 숫자 노출 방지</h1><section class="panel"><div class="compare"><div class="card bad"><h2>막을 문장</h2><p>학점 10의 지식은 빛났지만, 네트워크 3의 현실이었다.</p></div><div class="card good"><h2>허용 문장</h2><p>탄탄한 학업 기반은 면접 대화에서 힘을 발휘했지만, 관계망은 끝내 좁게 남았다.</p></div></div><p>합격/불합격 결과와 엔딩 기록 모두 숫자 스탯 대신 서사적 표현을 사용한다.</p></section></main></body></html>
