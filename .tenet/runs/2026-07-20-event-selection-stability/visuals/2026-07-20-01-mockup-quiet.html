<!doctype html><meta charset="utf-8"><title>Quiet loading</title><style>body{margin:0;background:#f3efe7;color:#292723;font:16px Georgia,serif}.app{max-width:760px;margin:40px auto;padding:28px}.card{background:#fffaf0;border:1px solid #d8cebc;border-radius:18px;padding:30px;box-shadow:0 12px 32px #5a493018}.eyebrow{font:12px system-ui;letter-spacing:.14em;color:#88745b}.choice{display:block;width:100%;text-align:left;margin:12px 0;padding:16px;border:1px solid #c9b99d;border-radius:12px;background:#fff}.lock{color:#59725e;font:13px system-ui}.loading{height:4px;background:#ded4c2;border-radius:8px;overflow:hidden}.loading:after{content:"";display:block;width:42%;height:100%;background:#6e8c70;animation:x 2s infinite}@keyframes x{from{transform:translateX(-100%)}to{transform:translateX(240%)}}</style><div class="app"><div class="card"><div class="eyebrow">다음 사건을 준비하는 중</div><h1>선택의 시간이 다가오고 있습니다</h1><p>이전 선택의 결과를 바탕으로 새로운 장면을 만들고 있어요. 조금 오래 걸려도 이 화면에서 기다려 주세요.</p><div class="loading"></div></div><br><div class="card"><div class="lock">✓ 이 사건은 선택할 때까지 유지됩니다</div><h1>늦은 밤의 메시지</h1><p>동아리 단체방에 예상치 못한 부탁이 올라왔다. 이미 만들어진 이 장면은 시간이 지나도 다른 사건으로 바뀌지 않는다.</p><button class="choice">솔직히 부담을 설명하고 역할을 조정한다</button><button class="choice">일단 맡되 도움을 요청한다</button></div></div>
