<!doctype html><meta charset="utf-8"><title>Event wait stability prototype</title><style>body{margin:0;background:#fff;color:#171717;font:16px system-ui}.app{max-width:700px;margin:50px auto;padding:20px}.screen{display:none}.screen.on{display:block}.story{border-top:6px solid #111;padding-top:28px}.wait{padding:18px;background:#f5f5f5;border-radius:10px}.dots{letter-spacing:5px;animation:p 1.2s infinite}@keyframes p{50%{opacity:.3}}button{width:100%;padding:16px;margin-top:10px;text-align:left;background:white;border:1px solid #bbb;border-radius:8px;cursor:pointer}button:hover{border-color:#111}.primary{background:#171717;color:white;text-align:center}.note{font-size:12px;color:#666}.result{padding:18px;border-left:4px solid #111;background:#f7f7f7}</style><div class="app"><section id="start" class="screen on"><div class="story"><h1>다음 장면</h1><p>이전 선택의 결과를 이어갈 사건을 준비합니다.</p><button class="primary" onclick="show('slow');setTimeout(()=>show('event'),1800)">다음 사건 생성</button></div></section><section id="slow" class="screen"><div class="wait"><strong>사건을 만들고 있습니다 <span class="dots">•••</span></strong><p>평소보다 오래 걸려도 기다립니다. 최대 제한 전에는 고정사건으로 전환하지 않습니다.</p></div></section><section id="event" class="screen"><div class="story"><p class="note">선택 대기 중 · 자동 교체 없음</p><h1>예상 밖의 면담 요청</h1><p>교수가 수업이 끝난 뒤 잠깐 남아 달라고 말했다. 복도에는 빗소리만 길게 이어졌다.</p><button onclick="duplicate()">먼저 면담의 목적을 차분히 묻는다</button><button onclick="choose()">최근 고민을 솔직하게 설명한다</button><button onclick="choose()">준비할 시간을 달라고 요청한다</button><p id="dup" class="note"></p></div></section><section id="done" class="screen"><div class="result"><strong>선택이 반영되었습니다</strong><p>당신은 최근 고민을 솔직하게 설명했고, 교수는 다음 주에 다시 이야기하자고 답했다.</p></div><button class="primary" onclick="show('start')">다음 장면으로</button></section></div><script>function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('on'));document.getElementById(id).classList.add('on')}function duplicate(){document.getElementById('dup').textContent='중복 요청을 가정해도 이미 확정된 이 사건이 그대로 반환됩니다.'}function choose(){show('done')}</script>
