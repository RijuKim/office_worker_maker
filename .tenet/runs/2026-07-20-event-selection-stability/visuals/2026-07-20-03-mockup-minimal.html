<!doctype html><meta charset="utf-8"><title>Minimal unchanged UI</title><style>body{margin:0;background:#fff;color:#171717;font:16px system-ui}.app{max-width:700px;margin:60px auto;padding:20px}.story{border-top:6px solid #111;padding-top:28px}.wait{padding:18px;background:#f5f5f5;border-radius:10px}.dots{letter-spacing:5px;animation:p 1.2s infinite}@keyframes p{50%{opacity:.3}}button{width:100%;padding:16px;margin-top:10px;text-align:left;background:white;border:1px solid #bbb;border-radius:8px}.note{font-size:12px;color:#666}</style><div class="app"><section class="wait"><strong>사건을 만들고 있습니다 <span class="dots">•••</span></strong><p>생성이 늦어져도 기다립니다. 실패한 경우에만 자연스럽게 다른 사건으로 이어집니다.</p></section><br><section class="story"><p class="note">선택 대기 중 · 자동 교체 없음</p><h1>예상 밖의 면담 요청</h1><p>교수가 수업이 끝난 뒤 잠깐 남아 달라고 말했다. 복도에는 빗소리만 길게 이어졌다.</p><button>먼저 면담의 목적을 차분히 묻는다</button><button>최근 고민을 솔직하게 설명한다</button><button>준비할 시간을 달라고 요청한다</button></section></div>
