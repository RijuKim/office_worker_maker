<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Life Stage Architecture</title>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7efe2; color: #2a241e; }
    main { max-width: 1080px; margin: 0 auto; padding: 28px; }
    h1 { font-size: 24px; margin: 0 0 8px; }
    p { margin: 0 0 20px; color: #6f6254; }
    svg { width: 100%; height: auto; background: #fffaf0; border: 3px solid #2a2018; box-shadow: 5px 5px 0 #2a2018; }
    .box { fill: #fff6df; stroke: #2a2018; stroke-width: 2.5; }
    .server { fill: #d5edf6; }
    .state { fill: #ffe0a2; }
    .ai { fill: #eadcf5; }
    .db { fill: #e5f2d1; }
    text { font-size: 14px; fill: #2a241e; font-weight: 700; }
    .small { font-size: 11px; font-weight: 500; fill: #5f5248; }
    path { stroke: #59483b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
  </style>
</head>
<body>
<main>
  <h1>State-Driven Life Progression Architecture</h1>
  <p>AI can propose story material, but server code validates all real transitions.</p>
  <svg viewBox="0 0 1040 620" role="img" aria-label="life stage state machine architecture">
    <defs>
      <marker id="arrow" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
        <polygon points="0 0, 10 4, 0 8" fill="#59483b"></polygon>
      </marker>
    </defs>
    <rect class="box" x="35" y="55" width="180" height="86" rx="6"></rect>
    <text x="125" y="88" text-anchor="middle">Client UI</text>
    <text class="small" x="125" y="112" text-anchor="middle">semester labels, choices</text>

    <rect class="box server" x="310" y="40" width="190" height="116" rx="6"></rect>
    <text x="405" y="78" text-anchor="middle">Next APIs</text>
    <text class="small" x="405" y="104" text-anchor="middle">events/next, choices</text>
    <text class="small" x="405" y="124" text-anchor="middle">auth scoped by userId</text>

    <rect class="box state" x="610" y="35" width="235" height="126" rx="6"></rect>
    <text x="727" y="72" text-anchor="middle">life-stage engine</text>
    <text class="small" x="727" y="98" text-anchor="middle">derive state, validate transitions</text>
    <text class="small" x="727" y="118" text-anchor="middle">semester, leave, dropout, gates</text>

    <rect class="box db" x="615" y="245" width="230" height="120" rx="6"></rect>
    <text x="730" y="285" text-anchor="middle">PostgreSQL / Prisma</text>
    <text class="small" x="730" y="310" text-anchor="middle">CharacterRun, HiddenState</text>
    <text class="small" x="730" y="330" text-anchor="middle">eventFlags JSON, history</text>

    <rect class="box ai" x="315" y="255" width="190" height="105" rx="6"></rect>
    <text x="410" y="294" text-anchor="middle">OpenRouter</text>
    <text class="small" x="410" y="320" text-anchor="middle">event prose, branch ideas</text>
    <text class="small" x="410" y="340" text-anchor="middle">never authoritative</text>

    <rect class="box" x="90" y="435" width="235" height="100" rx="6"></rect>
    <text x="207" y="472" text-anchor="middle">Ending Records UI</text>
    <text class="small" x="207" y="498" text-anchor="middle">no route grades</text>
    <text class="small" x="207" y="518" text-anchor="middle">earned destinations only</text>

    <rect class="box state" x="430" y="435" width="290" height="118" rx="6"></rect>
    <text x="575" y="470" text-anchor="middle">Destination / Family Gates</text>
    <text class="small" x="575" y="496" text-anchor="middle">company, grad school, startup</text>
    <text class="small" x="575" y="516" text-anchor="middle">marriage, child, parenting in Slice 2</text>

    <path d="M 215 98 L 310 98"></path>
    <path d="M 500 98 L 610 98"></path>
    <path d="M 727 161 L 727 245"></path>
    <path d="M 610 125 L 505 282"></path>
    <path d="M 505 318 L 610 142"></path>
    <path d="M 730 365 L 610 435"></path>
    <path d="M 430 488 L 325 488"></path>
    <path d="M 207 435 L 310 156"></path>
  </svg>
</main>
</body>
</html>
