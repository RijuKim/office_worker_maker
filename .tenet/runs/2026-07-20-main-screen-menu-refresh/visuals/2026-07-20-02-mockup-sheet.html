<!doctype html><html lang="ko"><meta charset="utf-8"><title>Menu sheet</title><style>*{box-sizing:border-box}body{margin:0;background:#1b2630;color:#f4f0e7;font-family:system-ui}.app{max-width:620px;margin:auto;padding:36px 20px}.head{display:grid;grid-template-columns:1fr auto;align-items:center;border-bottom:1px solid #557081;padding-bottom:18px}.title{font-size:29px;line-height:1.1;margin:0}.menu{border:1px solid #91b5c8;border-radius:10px;background:#263947;color:white;padding:12px 15px;font-weight:800}.sheet{margin-top:14px;background:#263947;border:1px solid #597587;border-radius:14px;padding:12px}.row{display:flex;justify-content:space-between;padding:14px;border-bottom:1px solid #405767}.settings{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:12px}.pill{background:#18252e;border-radius:9px;text-align:center;padding:12px}.card{margin-top:22px;background:#f3efe7;color:#27323a;border-radius:14px;padding:24px}@media(max-width:720px){.title{font-size:24px}.sheet{margin-left:-8px;margin-right:-8px}.settings{grid-template-columns:1fr}}</style><main class="app"><header class="head"><h1 class="title">일어나보니<br>대한민국 취준생</h1><button class="menu">메뉴</button></header><section class="sheet"><div class="row"><b>기록</b><span>→</span></div><div class="row"><b>새 시뮬레이션</b><span>→</span></div><div class="row"><b>로그인/저장</b><span>→</span></div><div class="settings"><div class="pill">배경음<br><b>OFF</b></div><div class="pill">효과음<br><b>ON</b></div><div class="pill">햅틱<br><b>ON</b></div></div></section><section class="card"><h2>캐릭터 설정</h2><p>나이 18–80 · 시작 장소 · 믿고 싶은 능력</p></section></main></html>
