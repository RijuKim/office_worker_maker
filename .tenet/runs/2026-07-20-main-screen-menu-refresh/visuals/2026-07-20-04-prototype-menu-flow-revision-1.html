<!doctype html><html lang="ko"><meta charset="utf-8"><title>단계형 시작 프로토타입</title><style>*{box-sizing:border-box}body{margin:0;background:#302519;color:#fff3d7;font-family:system-ui}.app{max-width:560px;margin:auto;padding:30px 18px}.head{position:relative;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.tag{font-size:12px;color:#b8d7a3;font-weight:900}.title{margin:2px 0 0;font-size:30px;line-height:1.12}.menu{width:44px;height:44px;border:2px solid #20170f;background:#f4c164;font-size:22px;box-shadow:3px 3px #19120c}.panel{position:absolute;right:0;top:56px;width:260px;background:#f7efe2;color:#282018;border:3px solid #282018;box-shadow:5px 5px #17110c;z-index:3}.hidden{display:none!important}.row{display:flex;width:100%;justify-content:space-between;border:0;border-bottom:2px solid #d8c8b4;background:none;padding:13px;font:800 14px system-ui;text-align:left}.card{margin-top:24px;min-height:390px;background:#f7efe2;color:#302519;border:4px solid #211810;padding:24px;display:flex;flex-direction:column}.step{display:none;flex:1}.step.active{display:flex;flex-direction:column}.scene{height:130px;background:linear-gradient(#657b89,#d19a62);border:3px solid #211810;margin-bottom:18px;display:grid;place-items:center;font-size:40px}.copy{line-height:1.8}.field{width:100%;padding:13px;border:2px solid #392a1e;font-size:16px}.choices{display:grid;gap:10px}.choice{border:2px solid #392a1e;background:#fffaf0;padding:14px;text-align:left;font:800 15px system-ui}.choice.active{background:#ffe0a2;outline:2px solid #d89332}.actions{display:flex;gap:10px;margin-top:auto;padding-top:20px}.next,.back{flex:1;padding:13px;border:2px solid #211810;font-weight:900}.next{background:#f4c164}.back{background:#e9dfd0}.progress{font-size:12px;color:#806c59;margin-bottom:12px}.abilities{display:grid;grid-template-columns:1fr 1fr;gap:8px}@media(max-width:720px){.title{font-size:25px}.panel{left:0;right:0;width:auto;top:65px}.card{min-height:430px}}</style><main class="app"><header class="head"><div><div class="tag">NEW RUN</div><h1 class="title">일어나보니<br>대한민국 취준생</h1></div><button id="trigger" class="menu" aria-expanded="false" aria-label="메뉴">☰</button><nav id="panel" class="panel hidden"><button class="row">기록 <span>›</span></button><button class="row">새 시뮬레이션 <span>›</span></button><button class="row">로그인/저장 <span>›</span></button><button class="row toggle">배경음 <b>OFF</b></button><button class="row toggle">효과음 <b>ON</b></button><button class="row toggle">햅틱 <b>ON</b></button></nav></header><section class="card"><div class="step active"><div class="scene">🌅</div><h2>낯선 아침이 시작됩니다.</h2><p class="copy">눈을 뜨니 오전 6시 47분입니다. 휴대폰에는 읽지 않은 메시지와 지원 일정이 쌓여 있습니다. 오늘의 선택은 앞으로의 생활과 관계에 오래 남게 됩니다.</p><p class="copy">이 이야기는 실제 진로 예측이 아닌 재미를 위한 허구의 시뮬레이션입니다.</p><div class="actions"><button class="next">시작하기</button></div></div><div class="step"><div class="progress">1 / 4</div><h2>당신의 이름은 무엇인가요?</h2><input class="field" value="한서윤" maxlength="24"><div class="actions"><button class="back">이전</button><button class="next">다음</button></div></div><div class="step"><div class="progress">2 / 4</div><h2>당신의 나이는 몇 살인가요?</h2><select id="age" class="field"></select><div class="actions"><button class="back">이전</button><button class="next">다음</button></div></div><div class="step"><div class="progress">3 / 4</div><h2>당신은 어디에서 깨어났나요?</h2><div class="choices"><button class="choice active">본가</button><button class="choice">자취방</button><button class="choice">기숙사</button></div><div class="actions"><button class="back">이전</button><button class="next">다음</button></div></div><div class="step"><div class="progress">4 / 4</div><h2>믿고 싶은 능력 두 가지를 골라주세요.</h2><div class="abilities"><button class="choice active">학업</button><button class="choice active">실무</button><button class="choice">커뮤니케이션</button><button class="choice">창의성</button></div><div class="actions"><button class="back">이전</button><button class="next">시뮬레이션 시작</button></div></div></section></main><script>const age=document.querySelector('#age');for(let n=18;n<=80;n++)age.add(new Option(n+'세',n,n===21,n===21));const steps=[...document.querySelectorAll('.step')];let i=0;function show(n){i=Math.max(0,Math.min(steps.length-1,n));steps.forEach((s,j)=>s.classList.toggle('active',j===i))}document.querySelectorAll('.next').forEach(b=>b.onclick=()=>show(i+1));document.querySelectorAll('.back').forEach(b=>b.onclick=()=>show(i-1));document.querySelectorAll('.choices .choice').forEach(b=>b.onclick=()=>{b.parentElement.querySelectorAll('.choice').forEach(x=>x.classList.remove('active'));b.classList.add('active')});const t=document.querySelector('#trigger'),p=document.querySelector('#panel');t.onclick=()=>{p.classList.toggle('hidden');t.setAttribute('aria-expanded',String(!p.classList.contains('hidden')))};document.querySelectorAll('.toggle').forEach(x=>x.onclick=()=>{const b=x.querySelector('b');b.textContent=b.textContent==='ON'?'OFF':'ON'});</script></html>
