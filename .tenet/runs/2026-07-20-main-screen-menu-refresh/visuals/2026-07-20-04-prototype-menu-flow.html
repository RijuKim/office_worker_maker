<!doctype html><html lang="ko"><meta charset="utf-8"><title>Menu flow prototype</title><style>*{box-sizing:border-box}body{margin:0;background:#302519;color:#fff3d7;font-family:system-ui}.app{max-width:560px;margin:auto;padding:38px 18px}.head{position:relative;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}.tag{font-size:12px;color:#b8d7a3;font-weight:900}.title{margin:2px 0 0;font-size:30px;line-height:1.12}.menu{width:44px;height:44px;border:2px solid #20170f;background:#f4c164;font-size:22px;box-shadow:3px 3px #19120c}.panel{position:absolute;right:0;top:56px;width:250px;background:#f7efe2;color:#282018;border:3px solid #282018;box-shadow:5px 5px #17110c;z-index:2}.hidden{display:none}.panel button,.setting{display:flex;width:100%;justify-content:space-between;border:0;border-bottom:2px solid #d8c8b4;background:none;padding:13px;font-weight:800}.setting{cursor:pointer}.on{color:#3f7b3b}.off{color:#8b4f2e}.card{margin-top:24px;background:#f7efe2;color:#302519;border:4px solid #211810;padding:24px}.field{margin:18px 0}.choice{border:2px solid #392a1e;padding:12px;margin:8px 0}.choice.active{background:#ffe0a2;outline:2px solid #d89332}.age{width:100%;padding:10px;border:2px solid #392a1e}@media(max-width:720px){.app{padding-top:24px}.title{font-size:25px}.panel{left:0;right:0;width:auto;top:65px}}</style><main class="app"><header class="head"><div><div class="tag">NEW RUN</div><h1 class="title">일어나보니<br>대한민국 취준생</h1></div><button id="trigger" class="menu" aria-expanded="false" aria-label="메뉴">☰</button><nav id="panel" class="panel hidden"><button>기록 <span>›</span></button><button>새 시뮬레이션 <span>›</span></button><button>로그인/저장 <span>›</span></button><div class="setting" data-key="music">배경음 <b class="off">OFF</b></div><div class="setting" data-key="sfx">효과음 <b class="on">ON</b></div><div class="setting" data-key="haptics">햅틱 <b class="on">ON</b></div></nav></header><section class="card"><div class="field"><b>당신은 몇 살인가요?</b><select class="age"><option>18세</option><option selected>21세</option><option>40세</option><option>65세</option><option>80세</option></select></div><div class="field"><b>당신은 어디에서 깨어났나요?</b><div class="choice active">서울의 작은 원룸</div><div class="choice">부모님 댁의 익숙한 방</div></div></section></main><script>const t=document.querySelector('#trigger'),p=document.querySelector('#panel');t.onclick=()=>{p.classList.toggle('hidden');t.setAttribute('aria-expanded',String(!p.classList.contains('hidden')))};document.querySelectorAll('.setting').forEach(x=>x.onclick=()=>{const b=x.querySelector('b'),on=b.textContent==='ON';b.textContent=on?'OFF':'ON';b.className=on?'off':'on'});document.querySelectorAll('.choice').forEach(x=>x.onclick=()=>{document.querySelectorAll('.choice').forEach(y=>y.classList.remove('active'));x.classList.add('active')});</script></html>
