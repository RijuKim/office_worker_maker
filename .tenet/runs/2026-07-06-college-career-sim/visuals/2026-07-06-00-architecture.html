<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>College Career Sim Architecture</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f6f7f2; color: #1f2933; }
    main { max-width: 1120px; margin: 0 auto; padding: 32px 20px; }
    h1 { font-size: 28px; margin: 0 0 8px; }
    p { margin: 0 0 20px; color: #52606d; line-height: 1.5; }
    .panel { background: #ffffff; border: 1px solid #d8ddd2; border-radius: 8px; padding: 16px; }
    svg { width: 100%; height: auto; display: block; }
    .node { transition: transform .16s ease, filter .16s ease; }
    .node:hover { transform: translateY(-2px); filter: drop-shadow(0 8px 16px rgba(31,41,51,.16)); }
    .label { font-size: 14px; font-weight: 700; fill: #1f2933; }
    .sub { font-size: 11px; fill: #52606d; }
    .flow { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    .note { margin-top: 14px; font-size: 13px; color: #52606d; }
  </style>
</head>
<body>
  <main>
    <h1>대학생 커리어 시뮬레이션 시스템 구조</h1>
    <p>웹 클라이언트는 화면과 입력을 담당하고, 게임 판정/저장/AI 검증은 서버 API가 소유한다. 이 구조는 이후 Unity나 모바일 클라이언트를 붙일 수 있게 한다.</p>
    <section class="panel">
      <svg viewBox="0 0 1100 620" role="img" aria-label="System architecture diagram">
        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"></polygon>
          </marker>
        </defs>

        <g class="node">
          <rect x="40" y="80" width="190" height="88" rx="8" fill="#e8f3ef" stroke="#2f855a" stroke-width="2"></rect>
          <text x="135" y="116" text-anchor="middle" class="label">Next.js Web Client</text>
          <text x="135" y="139" text-anchor="middle" class="sub">텍스트 어드벤처 UI</text>
          <text x="135" y="156" text-anchor="middle" class="sub">상태/관계/기록 카드</text>
        </g>

        <g class="node">
          <rect x="320" y="70" width="210" height="108" rx="8" fill="#fff7df" stroke="#c05621" stroke-width="2"></rect>
          <text x="425" y="106" text-anchor="middle" class="label">App Router APIs</text>
          <text x="425" y="129" text-anchor="middle" class="sub">auth, characters, events</text>
          <text x="425" y="146" text-anchor="middle" class="sub">records, destinations</text>
          <text x="425" y="163" text-anchor="middle" class="sub">server-only env vars</text>
        </g>

        <g class="node">
          <rect x="620" y="60" width="210" height="128" rx="8" fill="#eef2ff" stroke="#4c51bf" stroke-width="2"></rect>
          <text x="725" y="96" text-anchor="middle" class="label">Game Rules Engine</text>
          <text x="725" y="119" text-anchor="middle" class="sub">state transition validation</text>
          <text x="725" y="136" text-anchor="middle" class="sub">stat bounds / flags</text>
          <text x="725" y="153" text-anchor="middle" class="sub">career branch eligibility</text>
          <text x="725" y="170" text-anchor="middle" class="sub">record generation checks</text>
        </g>

        <g class="node">
          <rect x="890" y="78" width="170" height="92" rx="8" fill="#fdf2f8" stroke="#b83280" stroke-width="2"></rect>
          <text x="975" y="115" text-anchor="middle" class="label">OpenRouter</text>
          <text x="975" y="138" text-anchor="middle" class="sub">structured event JSON</text>
          <text x="975" y="155" text-anchor="middle" class="sub">10s timeout</text>
        </g>

        <g class="node">
          <rect x="335" y="300" width="210" height="118" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="2"></rect>
          <text x="440" y="334" text-anchor="middle" class="label">PostgreSQL + Prisma</text>
          <text x="440" y="358" text-anchor="middle" class="sub">users, sessions, characters</text>
          <text x="440" y="375" text-anchor="middle" class="sub">events, relationships, flags</text>
          <text x="440" y="392" text-anchor="middle" class="sub">career records, AI usage</text>
        </g>

        <g class="node">
          <rect x="630" y="315" width="210" height="92" rx="8" fill="#f5f3ff" stroke="#6d28d9" stroke-width="2"></rect>
          <text x="735" y="350" text-anchor="middle" class="label">Static Event Pool</text>
          <text x="735" y="373" text-anchor="middle" class="sub">fallback events</text>
          <text x="735" y="390" text-anchor="middle" class="sub">seed careers and parody companies</text>
        </g>

        <g class="node">
          <rect x="70" y="332" width="170" height="84" rx="8" fill="#fff1f2" stroke="#be123c" stroke-width="2"></rect>
          <text x="155" y="366" text-anchor="middle" class="label">Auth Boundary</text>
          <text x="155" y="389" text-anchor="middle" class="sub">email/password</text>
          <text x="155" y="406" text-anchor="middle" class="sub">account-scoped data</text>
        </g>

        <path class="flow" d="M 230 124 L 320 124"></path>
        <path class="flow" d="M 530 124 L 620 124"></path>
        <path class="flow" d="M 830 124 L 890 124"></path>
        <path class="flow" d="M 900 165 C 820 240, 720 240, 735 315"></path>
        <path class="flow" d="M 620 170 C 560 230, 505 250, 465 300"></path>
        <path class="flow" d="M 545 360 L 630 360"></path>
        <path class="flow" d="M 335 372 L 240 372"></path>
        <path class="flow" d="M 155 332 C 170 245, 245 185, 320 150"></path>

        <text x="280" y="105" class="sub">choices/forms</text>
        <text x="548" y="105" class="sub">validated request</text>
        <text x="842" y="105" class="sub">server-only AI prompt</text>
        <text x="517" y="278" class="sub">canonical state</text>
        <text x="562" y="348" class="sub">fallback lookup</text>
      </svg>
    </section>
    <p class="note">검증 원칙: AI는 서사 초안을 제안하고, 서버가 안전 규칙과 스키마를 통과한 변경만 저장한다.</p>
  </main>
</body>
</html>
